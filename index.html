<!DOCTYPE html>
<html>
<head>
  <title>Mom's Little Helper - from Doris</title>
</head>
<body style="background-color: lightblue; font-family: sans-serif; text-align: center;">

  <h1>Happy Working, Mom!</h1>
  <p style="background: white; padding: 10px; border-radius: 5px; width: fit-content; margin: 30px auto;">不要那么辛苦哦！</p>

  <a href="https://www.google.com" target="_blank" style="padding: 10px; margin: 10px; background: white; text-decoration: none; border-radius: 10px;">Open Google</a>
  <a href="weixin://" target="_blank" style="padding: 10px; margin: 10px; background: white; text-decoration: none; border-radius: 10px;">Open WeChat</a>
  <a href="https://gemini.google.com" target="_blank" style="padding: 10px; margin: 10px; background: white; text-decoration: none; border-radius: 10px;">Open Gemini</a>
  <div style="background: white; padding: 20px; border-radius: 10px; width: fit-content; margin: 20px auto;">
    <p style="font-weight: bold; margin-bottom: 30px;">Calculator</p>
    <input type="text" id="display" readonly style="width: 100%; margin-bottom: 10px; text-align: right;">
    <br>
     
    <button onclick="appendToDisplay('1')">1</button>
    <button onclick="appendToDisplay('2')">2</button>
    <button onclick="appendToDisplay('3')">3</button>
    <button onclick="appendToDisplay('4')">4</button>
    <button onclick="appendToDisplay('5')">5</button>
    <button onclick="appendToDisplay('6')">6</button>
    <button onclick="appendToDisplay('7')">7</button>
    <button onclick="appendToDisplay('8')">8</button>
    <button onclick="appendToDisplay('9')">9</button>
    <button onclick="appendToDisplay('0')">0</button>
    <button onclick="appendToDisplay('+')">+</button>
    <button onclick="appendToDisplay('-')">-</button>
    <button onclick="appendToDisplay('*')">×</button>
    <button onclick="appendToDisplay('/')">÷</button>
   

    <button onclick="calculate()">=</button>
    <button onclick="clearDisplay()">reset</button>
    <button onclick="deleteLast()">Del</button>
  
  </div>
  <script>
    function appendToDisplay(value) {
      document.getElementById('display').value += value;
    }
  
    function clearDisplay() {
      document.getElementById('display').value = '';
    }
  
    function calculate() {
      var result = eval(document.getElementById('display').value);
      document.getElementById('display').value = result;
    }

    document.addEventListener('keydown', function(event) {
  const key = event.key;
  // This checks if the key is a number or a math symbol
  if ((key >= 0 && key <= 9) || ['+', '-', '*', '/'].includes(key)) {
    appendToDisplay(key);
  } else if (key === 'Enter') {
    calculate();
  }else if (key === 'Backspace') {
  if (event.shiftKey) {
    // If Shift is held, clear everything!
    clearDisplay();
  } else {
    // If Shift is NOT held, just delete one number
    let current = document.getElementById('display').value;
    document.getElementById('display').value = current.slice(0, -1);
  }
  
}
});
function updateClock() {
  const now = new Date();
  const dateString = now.toLocaleDateString();
  const timeString = now.toLocaleTimeString();
  
  document.getElementById('time-display').innerText = "Today is " + dateString + " | Time: " + timeString;
}

// This tells the computer to run the function every 1000 milliseconds (1 second)
setInterval(updateClock, 1000);

// Run it once immediately so it's not blank when the page starts
updateClock();


  </script>
  
<p id="time-display" style="font-weight: bold; color: blue; margin: 10px;"></p>
<p id="time-display" style="font-weight: bold; color: blue;"></p>

</body>
</html>
